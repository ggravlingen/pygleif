version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - minor
          - patch
        patterns:
          - "actions/*"
          - "release-drafter/*"
          - "peter-evans/*"
          - "syphar/*"
          - "dorny/*"
          - "orgoro/*"
          - "astral-sh/*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
