name: Code quality tests

env:
  ALL_PYTHON_VERSIONS: "['3.13', '3.14']"

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  info:
    runs-on: ubuntu-latest
    name: Collect information & changes data
    outputs:
      run_pipeline: ${{ steps.changes.outputs.core }}
      python_versions: ${{ steps.info.outputs.python_versions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Filter for core changes
        uses: dorny/paths-filter@v3.0.2
        id: changes
        with:
          filters: |
            core:
              - ./**/*.py
              - .github/**/*.yml
              - pyproject.toml
              - uv.lock
              - docs/**
              - .readthedocs.yaml

      - name: Collect additional information
        id: info
        run: |
          echo "python_versions: ${ALL_PYTHON_VERSIONS}"
          echo "python_versions=${ALL_PYTHON_VERSIONS}" >> $GITHUB_OUTPUT

  linter:
    name: Run code linters
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: "2"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --all-groups

      - name: Run ruff
        run: uv run pre-commit run --hook-stage manual ruff --all-files --show-diff-on-failure
        env:
          RUFF_OUTPUT_FORMAT: github

      - name: Run ruff-format
        run: uv run pre-commit run --hook-stage manual ruff-format --all-files --show-diff-on-failure
        env:
          RUFF_OUTPUT_FORMAT: github

      - name: Run ty
        run: uv run pre-commit run --hook-stage manual ty --all-files --show-diff-on-failure

  pytest:
    name: Run test suite
    continue-on-error: true
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ --cov pygleif --cov-report xml:coverage.xml

      - name: Post coverage
        uses: orgoro/coverage@v3
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}

  pydantic-matrix:
    name: Run offline v2/compat matrix
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.info.outputs.run_pipeline == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
        group:
          - py313-v2
          - py314-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --group ${{ matrix.group }}

      - name: Run offline v2 and compat suites
        run: uv run pytest tests/v2 tests/compat

  docs:
    name: Build documentation
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install requirements
        run: uv sync --group docs

      - name: Build Sphinx docs (warnings as errors)
        run: uv run sphinx-build -b html -W docs docs/_build/html
