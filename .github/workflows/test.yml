name: Code quality tests

env:
  ALL_PYTHON_VERSIONS: "['3.13', '3.14']"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly live smoke test against the real GLEIF API to catch upstream
    # schema drift before it surfaces as a user-facing bug.
    - cron: "0 6 * * 1"

permissions:
  # Write is required for the coverage report to be posted back to the PR.
  pull-requests: write # zizmor: ignore[excessive-permissions]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  info:
    runs-on: ubuntu-latest
    name: Collect information & changes data
    if: github.event_name != 'schedule'
    outputs:
      run_pipeline: ${{ steps.changes.outputs.core }}
      python_versions: ${{ steps.info.outputs.python_versions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Filter for core changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            core:
              - ./**/*.py
              - .github/**/*.yml
              - pyproject.toml
              - uv.lock
              - docs/**
              - .readthedocs.yaml

      - name: Collect additional information
        id: info
        run: |
          echo "python_versions: ${ALL_PYTHON_VERSIONS}"
          echo "python_versions=${ALL_PYTHON_VERSIONS}" >> $GITHUB_OUTPUT

  linter:
    name: Run code linters
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: "2"
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --all-groups

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: no-commit-to-branch

  pytest:
    name: Run test suite
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ --cov pygleif --cov-report xml:coverage.xml

      - name: Post coverage
        uses: orgoro/coverage@ca0c362dc1a4f100447309405e6dfea47e251495 # v3.3.1
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}

  pydantic-matrix:
    name: Run offline v2/compat matrix
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.info.outputs.run_pipeline == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.info.outputs.python_versions) }}
        group:
          - py313-v2
          - py314-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --group ${{ matrix.group }}

      - name: Run offline v2 and compat suites
        run: uv run pytest tests/v2 tests/compat

  docs:
    name: Build documentation
    needs:
      - info
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.info.outputs.run_pipeline == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install requirements
        run: uv sync --group docs

      - name: Build Sphinx docs (warnings as errors)
        run: uv run sphinx-build -b html -W docs docs/_build/html

  live-smoke-test:
    name: Live GLEIF API smoke test
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install requirements
        run: uv sync --all-groups

      - name: Hit the real GLEIF API
        run: |
          uv run python -c "
          from pygleif.v2 import GleifClient

          with GleifClient(retries=3) as client:
              if not client.healthcheck():
                  raise SystemExit('GLEIF API healthcheck failed')
              record = client.get_lei_record('5493001KJTIIGC8Y1R12')
              print(record.data.attributes.lei)
          "
